dimensions:
  - key: business_complexity
    name: 业务复杂度
    evidence: 负责业务规模、用户/客户规模、收入/成本影响、跨区域/跨 BU 复杂度
  - key: decision_scope
    name: 决策范围
    evidence: 是否独立定义方向、是否影响路线图、是否拥有资源调配权
  - key: org_influence
    name: 组织影响力
    evidence: 跨团队协作范围、向上管理、对外客户/生态影响
  - key: professional_depth
    name: 专业深度
    evidence: 方法论、技术/产品判断、关键问题拆解能力
  - key: result_scale
    name: 结果规模
    evidence: 可复核指标、上线范围、商业化结果、效率提升
  - key: talent_scope
    name: 人才/团队
    evidence: 是否带人、培养他人、建立机制或标准

