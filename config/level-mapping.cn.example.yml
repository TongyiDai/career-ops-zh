# 说明：
# - 这是用于 research/growth 的“职级对标参考”，不是精确薪酬表；
# - 不同 BU、城市、年份、序列差异很大，必须结合 JD、面试反馈、薪酬数据源复核；
# - `market_equivalent` 只用于粗粒度对标，避免把不同公司的职级机械等同。

